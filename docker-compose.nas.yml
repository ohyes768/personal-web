# =============================================================================
# 个人财富网站 - NAS 部署统一编排
# =============================================================================
# 用途：Ubuntu Server NAS 部署 4 个服务（2 个后端 + 2 个前端）
# 用法：
#   1. 准备 .env：在仓库根目录创建 .env，填入阿里云 key（已被 .gitignore 忽略）
#        cat > .env << 'EOF'
#        DIVIDEND_ALIYUN_ACCESS_KEY=你的key
#        DOUYIN_ALIYUN_ACCESS_KEY=你的key
#        EOF
#   2. 启动：  docker compose -f docker-compose.nas.yml up -d --build
#              （自动读取根目录 .env）
#   3. 验证：  docker compose -f docker-compose.nas.yml ps
#   4. 停止：  docker compose -f docker-compose.nas.yml down
#
# 网络路由（路径式反代，由 NAS 上外部 Nginx 统一对外）：
#   /dividend/*     → dividend-frontend:3003
#   /api/dividend/* → dividend-backend:8092
#   /douyin/*       → douyin-frontend:3004
#   /api/douyin/*   → douyin-backend:8093
#
# 数据卷（用 named volume，docker 自动管理在 /var/lib/docker/volumes/）：
#   dividend-data / dividend-logs / dividend-config
#   douyin-data / douyin-logs
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # dividend 后端（A股高股息分析）
  # ---------------------------------------------------------------------------
  dividend-backend:
    build:
      context: ./backend/dividend-select
    container_name: dividend-backend
    restart: unless-stopped
    expose:
      - "8092"
    volumes:
      - dividend-data:/app/data
      - dividend-logs:/app/logs
      - dividend-config:/app/config
    environment:
      - LOG_LEVEL=INFO
      - ALIYUN_ACCESS_KEY=${DIVIDEND_ALIYUN_ACCESS_KEY:-}
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8092/api/dividend/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ---------------------------------------------------------------------------
  # dividend 前端（Next.js，basePath 已改为空）
  # ---------------------------------------------------------------------------
  dividend-frontend:
    build:
      context: ./apps/dividend
      dockerfile: Dockerfile
    container_name: dividend-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3003:3003"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_BASE_URL=
      # BACKEND_URL 不带 /api/dividend 前缀，由 BFF catch-all 路由从 request.url 提取完整路径
      - BACKEND_URL=http://dividend-backend:8092
    networks:
      - app-net
    depends_on:
      dividend-backend:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # douyin 后端（抖音视频文字转写）
  # ---------------------------------------------------------------------------
  douyin-backend:
    build:
      context: ./backend/douyin-processor
    container_name: douyin-backend
    restart: unless-stopped
    expose:
      - "8093"
    volumes:
      - douyin-data:/app/data
      - douyin-logs:/app/logs
    environment:
      - ALIYUN_ACCESS_KEY=${DOUYIN_ALIYUN_ACCESS_KEY:-}
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8093/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ---------------------------------------------------------------------------
  # douyin 前端（Next.js，basePath 已改为空）
  # ---------------------------------------------------------------------------
  douyin-frontend:
    build:
      context: ./apps/douyin
      dockerfile: Dockerfile
    container_name: douyin-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3004:3004"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_BASE_URL=
      - DOUYIN_BACKEND_URL=http://douyin-backend:8093/api/douyin
      - AWEME_BACKEND_URL=http://douyin-backend:8093/api/aweme
    networks:
      - app-net
    depends_on:
      douyin-backend:
        condition: service_healthy

# =============================================================================
# 网络 & 数据卷
# =============================================================================
networks:
  app-net:
    name: nginx_nginx-bridge
    external: true

volumes:
  dividend-data:
    name: dividend-data
  dividend-logs:
    name: dividend-logs
  dividend-config:
    name: dividend-config
  douyin-data:
    name: douyin-data
  douyin-logs:
    name: douyin-logs
