# personal-web HTTPS 反向代理
# 适配 Next.js 15 basePath='' + 路径式反代
# proxy_pass 直接用 Docker 服务名（兼容 conf.d include 上下文）

server {
    listen 9443 ssl;
    server_name localhost;

    ssl_certificate /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    # 聚合页：根路径返回 HTML 列表（HTML 压成单行，避开 # 颜色码误解析）
    location = / {
        default_type text/html;
        return 200 '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Personal Web</title><style>body{font-family:-apple-system,sans-serif;max-width:600px;margin:80px auto;padding:0 20px}h1{color:#1a1a1a}a{display:block;padding:16px 20px;margin:12px 0;background:#f5f5f7;border-radius:8px;color:#0066cc;text-decoration:none}a:hover{background:#e8e8ed}</style></head><body><h1>个人资讯网站</h1><a href="/dividend/">📈 股息率分析</a><a href="/douyin/">🎬 抖音视频文字稿</a></body></html>';
    }

    # dividend 静态资源
    location /dividend/_next/static {
        rewrite ^/dividend(_next/static/.*) $1 break;
        proxy_pass http://dividend-frontend:3003;
        proxy_set_header Host $host;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, immutable";
    }

    # douyin 静态资源
    location /douyin/_next/static {
        rewrite ^/douyin(_next/static/.*) $1 break;
        proxy_pass http://douyin-frontend:3004;
        proxy_set_header Host $host;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, immutable";
    }

    # 全局静态资源（basePath='' 时 HTML 直接引用 /_next/static/）
    location /_next/static {
        proxy_pass http://dividend-frontend:3003;
        proxy_set_header Host $host;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, immutable";
    }

    # dividend 页面
    location /dividend/ {
        proxy_pass http://dividend-frontend:3003/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # douyin 页面
    location /douyin/ {
        proxy_pass http://douyin-frontend:3004/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # dividend API
    location /api/dividend/ {
        proxy_pass http://dividend-backend:8092;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # douyin API
    location /api/douyin/ {
        proxy_pass http://douyin-backend:8093;
        proxy_set_header Host $host;
    }

    # douyin v2.0 API
    location /api/aweme/ {
        proxy_pass http://douyin-backend:8093;
        proxy_set_header Host $host;
    }
}
