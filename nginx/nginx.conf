# personal-web HTTPS 反向代理
# 适配 Next.js 15 basePath='' + 路径式反代

# 上游服务
upstream dividend_frontend {
    server dividend-frontend:3003;
}

upstream douyin_frontend {
    server douyin-frontend:3004;
}

upstream dividend_backend {
    server dividend-backend:8092;
}

upstream douyin_backend {
    server douyin-backend:8093;
}

server {
    listen 9443 ssl;
    server_name localhost;

    # SSL
    ssl_certificate /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    # ============================================
    # ★ 聚合页：根路径返回 HTML 列表
    # ============================================
    location = / {
        default_type text/html;
        return 200 '<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<title>Personal Web</title>
<style>
body { font-family: -apple-system, sans-serif; max-width: 600px; margin: 80px auto; padding: 0 20px; }
h1 { color: #1a1a1a; }
a { display: block; padding: 16px 20px; margin: 12px 0; background: #f5f5f7;
border-radius: 8px; color: #0066cc; text-decoration: none; }
a:hover { background: #e8e8ed; }
</style>
</head><body>
<h1>个人资讯网站</h1>
<a href="/dividend/">📈 股息率分析</a>
<a href="/douyin/">🎬 抖音视频文字稿</a>
</body></html>';
    }

    # ============================================
    # ★ 前端：location 末尾加 / 剥前缀
    # ============================================
    # dividend 页面（basePath='' → 剥前缀后 Next.js 看到 /）
    location /dividend/ {
        proxy_pass http://dividend_frontend/; # ★ 末尾 /
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # douyin 页面
    location /douyin/ {
        proxy_pass http://douyin_frontend/; # ★ 末尾 /
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ============================================
    # ★ API：location 末尾不加 /，透传路径给后端
    # ============================================
    # dividend API（后端 router 已加 /api/dividend 前缀）
    location /api/dividend/ {
        proxy_pass http://dividend_backend; # 末尾无 /
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # douyin API
    location /api/douyin/ {
        proxy_pass http://douyin_backend;
        proxy_set_header Host $host;
    }

    # douyin v2.0 API
    location /api/aweme/ {
        proxy_pass http://douyin_backend;
        proxy_set_header Host $host;
    }
}
