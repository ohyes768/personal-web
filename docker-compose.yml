version: '3.8'

services:
  # 经济数据应用
  economic:
    build:
      context: ./apps/economic
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  # 资金流向应用
  fund-flow:
    build:
      context: ./apps/fund-flow
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  # 股息率应用
  dividend:
    build:
      context: ./apps/dividend
      dockerfile: Dockerfile
    ports:
      - "3003:3003"
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  # 抖音视频文字稿应用
  douyin:
    build:
      context: ./apps/douyin
      dockerfile: Dockerfile
    ports:
      - "3004:3004"
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  # 新闻联播分析应用
  news:
    build:
      context: ./apps/news
      dockerfile: Dockerfile
    ports:
      - "3005:3005"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
