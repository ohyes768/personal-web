services:
  # API Gateway
  gateway:
    build: 
      context: ./gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - gateway/.env
    environment:
      - LOG_LEVEL=INFO
      - HOST=0.0.0.0
      - PORT=8080
    extra_hosts:
      - "douying-collect:host-gateway"  # 允许访问宿主机上的服务
    networks:
      - web-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Next.js 前端
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: personal-web-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_BASE_URL=http://gateway:8080
      - PORT=3000
    depends_on:
      gateway:
        condition: service_healthy
    networks:
      - web-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  web-network:
    driver: bridge

# 不再定义 douying-collect 服务和数据卷，使用已存在的
