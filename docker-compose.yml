services:
  # API Gateway (使用 host 网络模式)
  gateway:
    build: 
      context: ./gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    restart: unless-stopped
    network_mode: host  # 使用宿主机网络
    environment:
      - LOG_LEVEL=INFO
      - HOST=0.0.0.0
      - PORT=8080
    env_file:
      - gateway/.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Next.js 前端 (使用 bridge 网络)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: personal-web-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_BASE_URL=http://172.18.133.13:8080
      - PORT=3000
    networks:
      - web-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  web-network:
    driver: bridge

# douying-collect 已在宿主机运行，使用 host 网络模式的 gateway 可以直接访问
