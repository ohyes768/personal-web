services:
  # API Gateway
  gateway:
    build: 
      context: ./gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - gateway/.env
    environment:
      - LOG_LEVEL=INFO
      - HOST=0.0.0.0
      - PORT=8080
    networks:
      - web-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # douying-collect 服务
  douying-collect:
    build:
      context: ../douying-collect
      dockerfile: Dockerfile
    container_name: douying-collect
    restart: unless-stopped
    ports:
      - "8093:8093"
    volumes:
      - douying-data:/app/output
      - douying-cache:/app/.cache
      - douying-logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
    networks:
      - web-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8093/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Next.js 前端
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: personal-web-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_BASE_URL=http://gateway:8080
      - PORT=3000
    depends_on:
      gateway:
        condition: service_healthy
      douying-collect:
        condition: service_healthy
    networks:
      - web-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  web-network:
    driver: bridge

volumes:
  douying-data:
    driver: local
  douying-cache:
    driver: local
  douying-logs:
    driver: local
