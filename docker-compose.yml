services:
  # Next.js 前端
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_BASE_URL=
    container_name: personal-web-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_BASE_URL=
      - PORT=3000
      # 指向已运行的后端服务（使用 host.docker.internal 访问宿主机）
      - DOUYIN_SERVICE_URL=http://host.docker.internal:8093
      - MACRO_SERVICE_URL=http://host.docker.internal:8094
      - NEWS_SERVICE_URL=http://host.docker.internal:8091
      - DIVIDEND_API_URL=http://host.docker.internal:8092
    networks:
      - web-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  web-network:
    driver: bridge